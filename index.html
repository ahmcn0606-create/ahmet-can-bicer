<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TARAYICI SEKMESİNE İKON VE BAŞLIK -->
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SiYAH.png">
    <title>Ahmet Can BİÇER │ Elektronik Teknikeri</title>
    
    <link rel="stylesheet" href="css-style.css">
</head>
<body>

    <!-- BÜYÜTÜLMÜŞ SADE VE TEKNOLOJİK AÇILIŞ INTROSU -->
    <div class="preloader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease;">
        
        <!-- %50 Büyütülmüş Efekt Grubu -->
        <div style="position: relative; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center;">
            
            <!-- Etrafında Hafifçe Dönen İnce Teknoloji Halkası -->
            <div style="position: absolute; width: 100%; height: 100%; border: 3px solid rgba(255, 255, 255, 0.05); border-top: 3px solid #ffffff; border-radius: 50%; animation: spinRing 2s linear infinite;"></div>
            
            <!-- Ortada Yumuşakça Parlayarak Büyüyen Beyaz Monogram (Büyütüldü) -->
            <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Monogram" style="width: 100px; height: auto; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); animation: pulseGlow 2s ease-in-out infinite;">
        </div>
    </div>

    <!-- Efektlerin CSS Kodları -->
    <style>
        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(255,255,255,0.5)); }
            100% { transform: scale(0.95); opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        }
    </style>

    <!-- ÜST MENÜ (SOLDA MONOGRAM, SAĞDA TR BAYRAK ENTEGRELİ) -->
    <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(11, 11, 11, 0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 998;">
        <!-- SOL ÜST: MONOGRAM VE İSİM -->
        <div class="navbar-brand" style="display: flex; align-items: center; gap: 12px;">
            <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Logo" style="width: 35px; height: auto; display: block;">
            <div class="brand-text" style="font-weight: 700; color: #ffffff; letter-spacing: 1px;"></div>
        </div>
        
        <!-- SAĞ ÜST: LİNKLER VE TÜRK BAYRAĞI -->
        <ul class="nav-links" style="display: flex; align-items: center; gap: 20px; list-style: none; margin: 0; padding: 0;">
            <li><a href="index.html" class="active" style="color: #ffffff; text-decoration: none;">Ana Sayfa</a></li>
            <li><a href="hakkimda.html" style="color: #a0a0a0; text-decoration: none;">Hakkımda</a></li>
            <li><a href="projelerim.html" style="color: #a0a0a0; text-decoration: none;">Projelerim</a></li>
            <li><a href="iletisim.html" style="color: #a0a0a0; text-decoration: none;">İletişim</a></li>
            
            <!-- EN SAĞ: YAN YANA TR YAZISI VE TÜRK BAYRAĞI -->
            <li style="display: flex; align-items: center; gap: 8px; padding-left: 15px; border-left: 1px solid rgba(255,255,255,0.1); cursor: default;">
                <span style="font-size: 13px; font-weight: 700; color: #ffffff; letter-spacing: 1px;">TR</span>
                <img src="turk-bayraki.png" alt="Türk Bayrağı" style="width: 24px; height: auto; display: block; border-radius: 2px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
            </li>
        </ul>
    </nav>

    <!-- ANA ALAN VE PROFİL RESMİ -->
    <main class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85vh; text-align: center; padding: 100px 20px 40px 20px;">
        
        <div style="margin-bottom: 25px;">
            <img src="anasayfa_fotograf.jpeg" alt="Ahmet Can Biçer" style="width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 3px solid #ffffff; box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
        </div>

        <h1 style="font-size: 36px; font-weight: 800; color: #ffffff; margin-bottom: 10px;">Ahmet Can BİÇER</h1>
        <h2 style="font-size: 18px; color: #a0a0a0; font-weight: 500; letter-spacing: 1px; margin-bottom: 30px;">Elektronik Teknikeri</h2>

                <!-- SAVUNMA TEKNOLOJİLERİ MP4 VİDEO ALANI -->
        <div class="tech-video-container" style="max-width: 450px; margin: 0 auto 30px auto; overflow: hidden; border-radius: 8px; line-height: 0;">
            <!-- loops: sonsuz döngü, autoplay: otomatik oynat, muted: sessiz (şarttır), playsinline: mobil uyum -->
            <video autoplay muted loop playsinline style="width: 100%; height: auto; display: block; border-radius: 8px; object-fit: cover;">
                <source src="savunma_teknoloji.mp4" type="video/mp4">
                Tarayıcınız video etiketini desteklemiyor.
            </video>
        </div>


        <a href="projelerim.html" class="btn" style="padding: 12px 30px; text-transform: uppercase;">Keşfetmeye Başla</a>
    </main>

    <!-- FOOTER -->
    <footer style="padding: 20px; text-align: center; color: #666; font-size: 13px;">
        &copy; 2026 Ahmet Can Biçer. Tüm Hakları Saklıdır.
    </footer>

    <!-- ZAMANLAYICI SCRIPT -->
    <script>
        window.addEventListener('load', () => {
            const preloader = document.querySelector('.preloader');
            setTimeout(() => {
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 600);
                }
            }, 3000); 
        });
    </script>

</body>
</html>
