<!DOCTYPE html>
<html lang="tr">
<head>

    <title>İletişim │ Ahmet Can BİÇER</title>
    <link rel="stylesheet" href="css-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255, 0, 51, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; pointer-events: none; }
        .contact-container { max-width: 600px; margin: 0 auto; padding: 140px 20px; }
        input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; padding: 12px; margin: 10px 0; }
        button { background: #ff0033; color: #fff; border: none; padding: 12px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <main class="contact-container">
        <a href="index.html" style="color: #ff0033;">&larr; ANA SAYFAYA DÖN</a>
        <h1>İletişim</h1>
        <form>
            <input placeholder="Adınız">
            <textarea placeholder="Mesajınız"></textarea>
            <button>GÖNDER</button>
        </form>
    </main>
</body>
