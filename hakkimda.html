<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ACB MONOGRAM_SİYAH.png">
    <title>Hakkımda │ Ahmet Can BİÇER</title>
    <link rel="stylesheet" href="css-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        
        /* Izgara Efekti */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255, 0, 51, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; pointer-events: none; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 998; border-bottom: 1px solid rgba(255, 0, 51, 0.03); }
        .navbar-brand { display: flex; align-items: center; padding-right: 20px; border-right: 1px solid rgba(255, 0, 51, 0.1); height: 40px; }
        .nav-links { display: flex; align-items: center; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { color: #888888; text-decoration: none; font-size: 14px; font-weight: 500; }
        .about-container { max-width: 800px; margin: 0 auto; padding: 140px 20px 60px 20px; min-height: 100vh; box-sizing: border-box; }
        .skills-section { margin: 40px 0; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 0, 51, 0.03); padding: 30px; border-radius: 6px; }
        .skill-item { margin-bottom: 20px; }
        .skill-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #aaaaaa; text-transform: uppercase; margin-bottom: 8px; }
        .skill-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 10px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: #ff0033; border-radius: 10px; }
        .card-grid { display: flex; flex-direction: column; gap: 25px; width: 100%; }
        .info-card { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 0, 51, 0.04); border-radius: 6px; padding: 25px; }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px !important; flex-direction: column !important; gap: 12px !important; }
            .navbar-brand { border-right: none !important; height: auto !important; }
            .nav-links { gap: 15px !important; flex-wrap: wrap !important; justify-content: center !important; }
            .about-container { padding-top: 170px !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <img src="ACB MONOGRAM_BEYAZ.png" alt="ACB Logo" style="width: 38px; height: auto; display: block;">
        </div>
        <ul class="nav-links">
            <li><a href="#" style="color: #ffffff; font-weight: 600;">Hakkımda</a></li>
            <li><a href="projelerim.html" style="color: #888888;">Projelerim</a></li>
            <li><a href="cv.pdf" target="_blank" style="color: #ffffff; border: 1px solid #ff0033; padding: 6px 16px; border-radius: 4px; text-transform: uppercase;">CV</a></li>
        </ul>
    </nav>

    <main class="about-container">
        <a href="index.html" style="color: #ff0033; text-decoration: none; font-size: 14px; font-weight: 600;">&larr; Ana Sayfaya Dön</a>
        <h1 style="color: #ffffff; margin: 20px 0;">Kariyer Özeti</h1>
        <p style="color: #cccccc;">Elektronik devre tasarımı ve savunma sanayii odaklı sistemler...</p>
        <div class="skills-section">
            <h2 style="color: #ff0033; margin-bottom: 20px;">Program & Teknik Bilgi</h2>
            <div class="skill-item"><div class="skill-info"><span>Altium / Proteus</span><span>%85</span></div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width: 85%;"></div></div></div>
            <div class="skill-item"><div class="skill-info"><span>SolidWorks</span><span>%85</span></div><div class="skill-bar-bg"><div class="skill-bar-fill" style="width: 85%;"></div></div></div>
        </div>
    </main>
</body>
</html>
